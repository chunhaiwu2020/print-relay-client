name: Apply client tray fix

on:
  push:
    paths:
      - '.github/workflows/apply-client-tray-fix.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch printer client
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('printer-client.py')
          text = path.read_text(encoding='utf-8')

          config_block = '''# Runtime files live in AppData so the installed client can save settings
# without needing administrator rights.
_EXE_DIR = Path(sys.executable).parent if getattr(sys, 'frozen', False) else Path(__file__).parent
CONFIG_DIR = Path(os.getenv('APPDATA', os.path.expanduser('~'))) / 'PrintRelay'
CONFIG_FILE = CONFIG_DIR / 'config.json'
LOG_FILE = CONFIG_DIR / 'client.log'
INI_FILE = CONFIG_DIR / "config.ini"
LEGACY_INI_FILE = _EXE_DIR / "config.ini"
CONFIG_DIR.mkdir(parents=True, exist_ok=True)

def load_config():
    """读取 config.ini"""
    cfg = configparser.ConfigParser()
    ini_path = INI_FILE
    if not ini_path.exists() and LEGACY_INI_FILE.exists():
        try:
            INI_FILE.write_text(LEGACY_INI_FILE.read_text(encoding='utf-8'), encoding='utf-8')
            log.info(f"Migrated config.ini to {INI_FILE}")
        except Exception as e:
            log.warning(f"Could not migrate legacy config.ini: {e}")
            ini_path = LEGACY_INI_FILE

    if ini_path.exists():
        cfg.read(ini_path, encoding='utf-8')
        log.info(f"Loaded config: {len(cfg.sections())} printer sections from {ini_path}")
    else:
        log.info("No config.ini yet; use the client window to choose printers.")
    return cfg

'''

          text = re.sub(
              r'# .*?EXE.*?\n_EXE_DIR = .*?\n.*?CONFIG_DIR\.mkdir\(parents=True, exist_ok=True\)\n\n',
              config_block,
              text,
              count=1,
              flags=re.S,
          )

          text = text.replace(
              """    def _loop(self):\n        while self.running:\n            try: self._run()\n            except Exception as e: log.error(f\"Loop error: {e}\")\n            if self.running:\n""",
              """    def _loop(self):\n        while self.running:\n            try:\n                should_retry = self._run()\n            except Exception as e: log.error(f\"Loop error: {e}\")\n            else:\n                if should_retry is False:\n                    self.running = False\n                    return\n            if self.running:\n""",
          )

          text = text.replace(
              """        if resp == b'UNKNOWN_TOKEN':\n            self._state('error', 'Unknown token — add this code in control panel')\n            sock.close(); return\n        if resp == b'WRONG_TYPE':\n            self._state('error', 'Token is not a client type')\n            sock.close(); return\n""",
              """        if resp == b'UNKNOWN_TOKEN':\n            self._state('error', f'Unknown token — add this code in control panel: {self.token}')\n            sock.close(); return False\n        if resp == b'WRONG_TYPE':\n            self._state('error', 'Token is not a client type')\n            sock.close(); return False\n""",
          )

          text = text.replace(
              """_orig_proc = None\n_tray_cb = {}\n""",
              """_orig_proc = None\n_wnd_proc_ref = None\n_tray_cb = {}\n""",
          )

          text = text.replace(
              """        # 托盘图标\n        self._hicon = None\n        self.root.after(500, self._init_tray)\n""",
              """        # 托盘图标\n        self._hicon = None\n        self._tray_nid = None\n        self.root.after(500, self._init_tray)\n""",
          )

          tray_block = '''    def _close(self):
        """最小化到通知区域"""
        if not self._tray_nid:
            self._init_tray()
        self.root.withdraw()
        self._log("Minimized to tray")

    def _quit(self):
        """Full quit"""
        try:
            if self._tray_nid:
                _ct.windll.shell32.Shell_NotifyIconA(_NIM_DELETE, _ct.byref(self._tray_nid))
        except: pass
        if self._hicon:
            try: _ct.windll.user32.DestroyIcon(self._hicon)
            except: pass
        self.client.stop()
        self.root.destroy()

    def _show(self):
        """还原窗口"""
        self.root.deiconify()
        self.root.state('normal')
        self.root.lift()
        self.root.focus_force()

    def _init_tray(self):
        """创建托盘图标 (窗口过程钩子)"""
        global _orig_proc, _wnd_proc_ref
        if self._tray_nid:
            return
        try:
            hwnd = int(self.root.frame(), 16)
        except:
            self.root.after(1000, self._init_tray); return

        hicon = _get_printer_icon()
        self._hicon = hicon

        # Keep the callback object alive; Windows may call it after this method returns.
        _wnd_proc_ref = _WNDPROC(_wnd_proc)
        _orig_proc = _ct.windll.user32.SetWindowLongPtrA(
            hwnd, -4, _ct.cast(_wnd_proc_ref, _ct.c_void_p).value)

        # 设置回调
        _tray_cb['show'] = self._show
        _tray_cb['menu'] = self._show_tray_menu

        # 添加托盘图标
        nid = _NOTIFYICONDATA()
        nid.cbSize = _ct.sizeof(nid)
        nid.hWnd = hwnd
        nid.uID = 1
        nid.uFlags = _NIF_MESSAGE | _NIF_ICON | _NIF_TIP
        nid.uCallbackMessage = _WM_TRAY
        nid.hIcon = hicon
        nid.szTip = b"Print Relay"
        _ct.windll.shell32.Shell_NotifyIconA(_NIM_ADD, _ct.byref(nid))
        self._tray_nid = nid
        self._log("Tray icon created")

'''
          text = re.sub(r'    def _close\(self\):\n.*?\n    def _show_tray_menu\(self\):\n', tray_block + '    def _show_tray_menu(self):\n', text, count=1, flags=re.S)

          single_block = '''def _check_single_instance():
    """防止同时跑多个客户端"""
    import ctypes as _ct2
    _ct2.windll.kernel32.CreateMutexA(None, False, b"PrintRelayClient_SingleInstance_v4")
    if _ct2.windll.kernel32.GetLastError() == 183:
        if not _show_existing_window():
            _ct2.windll.user32.MessageBoxA(0,
                b"Print Relay is already running.\\nPlease check the notification area.",
                b"Print Relay", 0x40)
        sys.exit(0)

def _show_existing_window():
    """Bring the hidden Tk window back when the user opens the shortcut again."""
    import ctypes as _ct3
    from ctypes import wintypes as _w3

    found = {"hwnd": 0}
    enum_proc_type = _ct3.WINFUNCTYPE(_w3.BOOL, _w3.HWND, _w3.LPARAM)

    def enum_proc(hwnd, lparam):
        length = _ct3.windll.user32.GetWindowTextLengthW(hwnd)
        if length:
            buf = _ct3.create_unicode_buffer(length + 1)
            _ct3.windll.user32.GetWindowTextW(hwnd, buf, length + 1)
            if buf.value.startswith("Print Relay - "):
                found["hwnd"] = hwnd
                return False
        return True

    _ct3.windll.user32.EnumWindows(enum_proc_type(enum_proc), 0)
    hwnd = found["hwnd"]
    if not hwnd:
        return False

    _ct3.windll.user32.ShowWindow(hwnd, 9)  # SW_RESTORE
    _ct3.windll.user32.SetForegroundWindow(hwnd)
    return True

'''
          text = re.sub(r'def _check_single_instance\(\):\n.*?\ndef _install_autostart\(\):\n', single_block + 'def _install_autostart():\n', text, count=1, flags=re.S)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit fix and remove one-time workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-client-tray-fix.yml
          git add printer-client.py
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix tray restore behavior"
            git push
          fi
