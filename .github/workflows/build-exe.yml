name: Build EXE

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install pywin32 pyinstaller jinja2

      - name: 编译 EXE（调试模式 · 黑窗）
        run: |
          python build.py --console
          ren dist\PrintRelay-Client.exe PrintRelay-Client-DEBUG.exe
        env:
          PYTHONIOENCODING: utf-8

      - name: 编译 EXE（窗口模式）
        run: python build.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: PrintRelay-Client
          path: |
            dist/PrintRelay-Client.exe
            dist/PrintRelay-Client-DEBUG.exe
