name: Build Windows 7 EXE + Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-win7:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.8
      uses: actions/setup-python@v5
      with:
        python-version: '3.8.10'

    - name: Install legacy dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-win7.txt

    - name: Build Win7 EXE
      run: python build-win7.py

    - name: Install NSIS
      run: choco install nsis -y --no-progress

    - name: Build Win7 Installer
      run: |
        & "C:\Program Files (x86)\NSIS\makensis.exe" installer-win7.nsi
        dir SETUP-Win7-6.0.3.exe

    - name: Upload Win7 EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrintRelay-Client-Win7
        path: dist/PrintRelay-Client-Win7.exe

    - name: Upload Win7 Installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrintRelay-Setup-Win7-6.0.3
        path: SETUP-Win7-6.0.3.exe
