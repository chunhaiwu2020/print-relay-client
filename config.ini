[printer.bar]
# 酒吧 — 只打酒水，一菜一单
name = Bar Printer
template = templates/bar.json
mode = per_item
feed_lines = 2
cut_per_item = true

[printer.coffee]
# 咖啡吧 — 饮品
name = Coffee Printer
template = templates/coffee.json
mode = per_item
feed_lines = 2
cut_per_item = true

[printer.kitchen]
# 厨房 — 只打菜名，一菜一切
name = Xprinter XP-80
template = templates/kitchen_item.json
mode = per_item
feed_lines = 4
cut_per_item = true

[printer.front]
# 前台/收银 — 完整小票含价格合计
name = Front Printer
template = templates/front.json
mode = receipt
feed_lines = 3
cut_after = true

[printer.receipt]
# 顾客小票
name = Customer Printer
template = templates/receipt.json
mode = receipt
feed_lines = 3
cut_after = true
